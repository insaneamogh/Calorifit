<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalorieCalx — Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px 20px;
      gap: 48px;
    }

    h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    h1 span { color: #3b82f6; }

    .devices {
      display: flex;
      gap: 64px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .device-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }

    .device-label {
      color: #6b7280;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 500;
    }

    /* ── iPhone 15 Pro ── */
    .iphone {
      width: 375px;
      height: 812px;
      background: #1c1c1e;
      border-radius: 54px;
      border: 10px solid #2c2c2e;
      box-shadow:
        0 0 0 1px #3a3a3c,
        0 40px 100px rgba(0,0,0,.8),
        inset 0 0 0 1px #111;
      position: relative;
      overflow: hidden;
    }

    /* Dynamic island */
    .iphone::before {
      content: '';
      position: absolute;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    .iphone iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 44px;
    }

    /* ── Desktop browser ── */
    .browser {
      width: 900px;
      background: #1c1c1e;
      border-radius: 14px;
      border: 1px solid #3a3a3c;
      box-shadow: 0 40px 100px rgba(0,0,0,.8);
      overflow: hidden;
    }

    .browser-bar {
      background: #2c2c2e;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #3a3a3c;
    }

    .dots { display: flex; gap: 6px; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .dot.red   { background: #ff5f57; }
    .dot.yellow{ background: #ffbd2e; }
    .dot.green { background: #28c840; }

    .url-bar {
      flex: 1;
      background: #3a3a3c;
      border-radius: 6px;
      padding: 4px 12px;
      color: #9ca3af;
      font-size: 13px;
      font-family: monospace;
    }

    .browser iframe {
      width: 100%;
      height: 680px;
      border: none;
      display: block;
    }

    footer {
      color: #4b5563;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>CalorieCalx <span>Preview</span></h1>

  <div class="devices">

    <!-- iPhone 15 Pro -->
    <div class="device-wrap">
      <div class="device-label">iPhone 15 Pro</div>
      <div class="iphone">
        <iframe src="/" title="Mobile view" loading="lazy"></iframe>
      </div>
    </div>

    <!-- Desktop browser -->
    <div class="device-wrap">
      <div class="device-label">Web / Desktop</div>
      <div class="browser">
        <div class="browser-bar">
          <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          <div class="url-bar" id="urlBar">calorifit-web.up.railway.app</div>
        </div>
        <iframe src="/" title="Web view" loading="lazy"></iframe>
      </div>
    </div>

  </div>

  <footer>Live preview — changes deploy automatically on push to main</footer>

  <script>
    document.getElementById('urlBar').textContent = window.location.host;
  </script>
</body>
</html>
